registry_id: uam-bridge-skills-test-registry
version: 0.1.0
status: tests-root-active
date: 2026-06-22
evidence_ceiling: design-time
source_basis:
  - skills/active/uam-bridge-skills/MANIFEST.yaml
  - docs/cleanup/workspace-taxonomy-v2.md
authority:
  manifest_is_suite_path_source: true
  registry_does_not_upgrade_evidence: true
  current_manifest_path: skills/active/uam-bridge-skills/MANIFEST.yaml
  current_root: tests
  previous_root: evals
  planned_root: tests
export_policy:
  default_exportability: internal
  public_default_allowed_roots:
    - public-evidence
    - results
    - integrity
  excluded_path_patterns:
    - "**/*.local.md"
    - "**/*.local.yaml"
    - "**/*.local.yml"
    - "**/*.local.json"
    - "**/private.local/**"
    - "**/scoring-keys.local/**"
    - "**/raw-private/**"
    - "**/raw/**"
    - "**/raw-outputs.*"
    - "**/Test Responses/**"
    - "**/private-run-map.*"
    - "**/private-hashes.*"
    - "**/mapping-key*.local.md"
    - "**/*scoring-key*"
    - "**/*scoring_keys*"
    - "**/raw transcripts/**"
    - "**/raw private transcripts/**"
  excluded_material_classes:
    - raw_private_transcripts
    - private_run_maps
    - evaluator_scoring_keys
    - mapping_keys
    - private_hashes
planned_run_manifest_required_fields:
  - run_id
  - run_type
  - source_basis
  - evidence_stage
  - exportability
  - private_material
  - roles
  - status
suite_categories:
  command_skills: tests/suites/command-skills
  routing: tests/suites/routing
  object_integrity: tests/suites/object-integrity
  evidence_ceiling: tests/suites/evidence-ceiling
  degradation: tests/suites/degradation
  overactivation: tests/suites/overactivation
  cross_model_parity: tests/suites/cross-model-parity
  pressure: tests/suites/pressure
  behavioral: tests/suites/behavioral
  lifecycle: tests/suites/lifecycle
  compounding: tests/suites/compounding
