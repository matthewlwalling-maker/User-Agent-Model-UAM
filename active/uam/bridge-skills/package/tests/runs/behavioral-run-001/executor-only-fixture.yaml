suite_id: uam_bridge_behavioral_executor_only
source_suite: uam_bridge_behavioral
source_suite_file: uam-bridge-behavioral-suite.yaml
version: 0.1.0
run_status: not_run
evidence_stage: design-time
target_package: uam-bridge-skills
target_version: 0.1.0
view: executor_only
permitted_case_fields:
  - id
  - prompt
  - supplied_context
  - evidence_stage
  - target_package
  - target_version
  - permitted_reads
  - forbidden_reads
  - raw_output_capture_contract
forbidden_case_fields:
  - hidden_trap
  - required_behavior
  - prohibited_behavior
  - observable_evidence
  - weak_if
  - hard_fail
  - scoring_dimensions
  - value_verdict_rule
  - baseline_value_hypothesis
  - decision_delta_probe
permitted_reads:
  - uam-bridge-skills/MANIFEST.yaml
  - uam-bridge-skills/KERNEL.md
  - uam-bridge-skills/skills/*/SKILL.md
  - this executor-only fixture
forbidden_reads_before_raw_outputs_lock:
  - uam-bridge-skills/evals/uam-bridge-behavioral-suite.yaml
  - uam-bridge-skills/evals/claude-high-pressure-test-suite/evaluator-packet.md
  - mapping-key.local.md
  - hidden traps, required behavior, prohibited behavior, hard-fail rules, scoring rubrics, expected winners
raw_output_capture_contract:
  - Preserve verbatim outputs, one file per case, turn, and arm.
  - Run V-* cases as paired target and baseline arms with opaque arm labels.
  - Run M-CHAIN-01 turns in one continuous target-arm session.
  - Do not score, diagnose, remediate, patch, install, activate, deploy, or update release status.
cases:
