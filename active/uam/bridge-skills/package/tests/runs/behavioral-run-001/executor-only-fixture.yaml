    target_version: 0.1.0
    evidence_stage: design-time
    raw_output_capture_contract: Run target arm only unless the run custodian explicitly schedules an additional baseline arm; capture verbatim output.
    prompt: |-
      /align Turn what we've covered into a concrete scope before we start building the adapter.
    supplied_context: |-
      Loose intent: 'a Codex adapter that reads the manifest'. No prior committed state object supplied.
